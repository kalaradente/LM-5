<svg width="100%" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Mounting diagram for IWR6843ISK and K-MC1 on a shared rigid plate</title>
<desc>Top view shows both sensor modules side by side on one dashed mounting plate, centered on the target line, each with a forward boresight arrow. Side view shows the plate on a stand, tilted ten degrees up, at a height approximately equal to ball height, sighting toward the ball two meters away.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="205" y="32" width="12" height="12" rx="2" fill="#4a90d9"/>
<text x="222" y="42" font-size="12" font-family="sans-serif">IWR6843ISK — geometry</text>
<rect x="430" y="32" width="12" height="12" rx="2" fill="#3fb0a8"/>
<text x="447" y="42" font-size="12" font-family="sans-serif">K-MC1 — spin</text>

<text x="40" y="70" font-size="14" font-weight="500" font-family="sans-serif">Top view (plan)</text>
<text x="345" y="84" font-size="12" text-anchor="middle" font-family="sans-serif">Rigid mounting plate</text>
<rect x="195" y="94" width="300" height="112" rx="8" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3"/>

<rect x="215" y="111" width="120" height="78" rx="4" fill="#4a90d9"/>
<text x="275" y="141" font-size="14" font-weight="500" text-anchor="middle" fill="#fff" font-family="sans-serif">IWR6843ISK</text>
<text x="275" y="161" font-size="12" text-anchor="middle" fill="#fff" font-family="sans-serif">60GHz geometry</text>

<rect x="355" y="111" width="120" height="78" rx="4" fill="#3fb0a8"/>
<text x="415" y="141" font-size="14" font-weight="500" text-anchor="middle" fill="#fff" font-family="sans-serif">K-MC1</text>
<text x="415" y="161" font-size="12" text-anchor="middle" fill="#fff" font-family="sans-serif">24GHz spin</text>

<line x1="275" y1="189" x2="275" y2="231" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="415" y1="189" x2="415" y2="231" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="345" y1="104" x2="345" y2="267" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 2"/>
<line x1="337" y1="229" x2="353" y2="239" stroke="#888" stroke-width="0.5"/>
<line x1="337" y1="239" x2="353" y2="249" stroke="#888" stroke-width="0.5"/>
<text x="361" y="236" font-size="12" font-family="sans-serif">~2 m to ball (schematic)</text>
<circle cx="345" cy="264" r="4" fill="#888"/>
<text x="355" y="268" font-size="12" font-family="sans-serif">ball</text>

<text x="40" y="304" font-size="14" font-weight="500" font-family="sans-serif">Side view (elevation)</text>
<line x1="80" y1="444" x2="600" y2="444" stroke="#888" stroke-width="0.5"/>
<text x="90" y="459" font-size="12" font-family="sans-serif">ground</text>

<line x1="300" y1="444" x2="300" y2="359" stroke="#888" stroke-width="0.5"/>
<rect x="230" y="354" width="140" height="10" rx="2" fill="#bbb" transform="rotate(-10 300 359)"/>
<text x="300" y="336" font-size="12" text-anchor="middle" font-family="sans-serif">mounting plate (both units)</text>

<line x1="300" y1="359" x2="348" y2="359" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="313" y="375" font-size="12" font-family="sans-serif">10&#176; tilt</text>

<line x1="200" y1="359" x2="200" y2="444" stroke="#888" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="192" y="404" font-size="12" text-anchor="end" font-family="sans-serif">mount height</text>

<line x1="300" y1="359" x2="480" y2="327" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<line x1="444" y1="327" x2="456" y2="339" stroke="#888" stroke-width="0.5"/>
<line x1="444" y1="337" x2="456" y2="349" stroke="#888" stroke-width="0.5"/>
<text x="452" y="318" font-size="12" font-family="sans-serif">~2 m (schematic)</text>
<circle cx="480" cy="327" r="4" fill="#888"/>
<text x="490" y="331" font-size="12" font-family="sans-serif">ball</text>
</svg>
